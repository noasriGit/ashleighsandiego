<!--
  IDX wrapper for sdcommunities.idxbroker.com

  ═══════════════════════════════════════════════════════════════════
  USE INCLUDES WRAPPER (recommended) — Static wrapper breaks Results CSS
  ═══════════════════════════════════════════════════════════════════

  Static wrappers pasted into IDX break Results / Custom CSS loading.
  Host header/footer on sdcommunities.com and use Includes (cURL) instead.

  IDX Middleware → Design → Website → Wrappers → Global (or your level):
    1. Wrapper type: Includes (NOT Static)
    2. Header URL: https://sdcommunities.com/idx-header.html
    3. Footer URL: https://sdcommunities.com/idx-footer.html
    4. Save

  Hosted files (deploy sdcommunities.com first):
    - public/idx-header.html  → fonts + idx-wrapper.css + idx-results.css + <header>
    - public/idx-footer.html  → <footer> only
    - public/idx-wrapper.css  → header/footer styles (no @import)
    - public/idx-results.css  → results page styles

  After switching to Includes:
    - REMOVE @import from IDX Global Custom CSS (results load via idx-header.html)
    - You can clear Categories → Results Custom CSS (optional duplicate)

  Source copies: edit public/idx-header.html and public/idx-footer.html, then redeploy.

  ═══════════════════════════════════════════════════════════════════
  STATIC WRAPPER (fallback — known to break results CSS, avoid if possible)
  ═══════════════════════════════════════════════════════════════════

  If you must use Static: paste ONLY plain HTML with NO <link>, NO <style>.
  Use inline style="" on header/footer elements. Do NOT use the block below
  with <link> tags — it interferes with IDX Results styling.
-->
