<!--
  IDX wrapper HEADER (Static / Includes).

  MUST be a real document head + open <body> — NOT a bare fragment. Per IDX docs,
  the header section is "<html>, <head>, and some of the <body>" and IDX injects
  its OWN default stylesheets into this <head>. Earlier versions shipped a headless
  fragment, so IDX had nowhere to inject its base results/detail CSS: every IDX page
  lost its grid/card layout (raw stacked listings) even though our wrapper chrome
  and color overrides loaded. Disabling the wrapper "fixed" it only because IDX then
  served its own complete document (with its base CSS).

  Layout therefore comes from IDX's injected base CSS; our brand layer
  (idx-results.css / idx-detail.css) loads LAST from idx-footer.html to override
  colors/spacing. Keep all URLs absolute. Bump ?v= after editing any CSS file.
-->
