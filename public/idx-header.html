        src="https://sdcommunities.com/images/berkshirelogo.webp"

    <nav class="sd-nav-desktop" aria-label="Main navigation">
      <a href="https://sdcommunities.com/relocating-to-san-diego">Relocating</a>

      <a href="https://sdcommunities.com/military-va-relocation-san-diego">Military / VA</a>

    <details class="sd-mobile-menu">
      <summary aria-label="Open menu">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
      </summary>
      <nav class="sd-mobile-panel" aria-label="Mobile navigation">
        <a href="https://sdcommunities.com/relocating-to-san-diego">Relocating to San Diego</a>
        <a href="https://sdcommunities.com/moving-to-la-jolla">Moving to La Jolla</a>

  </div>

  <div class="sd-header-row sd-header-row--search">
    <a class="sd-search-pill" href="https://sdcommunities.com/search-homes">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" />
      </svg>
      Search homes on sdcommunities.com
    </a>

    <div class="sd-search-bar" data-sd-search-bar>
      <form class="sd-search-form" aria-label="Search MLS listings">
        <div class="sd-search-fields">
          <div class="sd-search-type" role="group" aria-label="Buy or rent">
            <button type="button" class="sd-search-type-btn is-active" data-listing-type="buy" aria-pressed="true">Buy</button>
            <button type="button" class="sd-search-type-btn" data-listing-type="rent" aria-pressed="false">Rent</button>
          </div>

          <div class="sd-search-divider" aria-hidden="true"></div>

          <label class="sd-search-field">
            <span class="sd-search-field-label">Area</span>
            <select data-area aria-label="Area">
              <option value="_general">All San Diego</option>
              <option value="la-jolla">La Jolla</option>
              <option value="pacific-beach">Pacific Beach</option>
              <option value="university-city">University City / UTC</option>
              <option value="clairemont">Clairemont</option>
              <option value="mission-valley">Mission Valley</option>
              <option value="del-mar">Del Mar</option>
              <option value="carmel-valley">Carmel Valley</option>
              <option value="point-loma">Point Loma</option>
              <option value="sorrento-valley">Sorrento Valley</option>
              <option value="bay-park">Bay Park</option>
              <option value="ocean-beach">Ocean Beach</option>
              <option value="hillcrest">Hillcrest</option>
              <option value="north-park">North Park</option>
            </select>
          </label>

          <div class="sd-search-divider" aria-hidden="true"></div>

          <div class="sd-search-price-group">
            <label class="sd-search-field sd-search-field--price">
              <span class="sd-search-field-label">Min price</span>
              <select data-min-price aria-label="Minimum price"></select>
            </label>
            <label class="sd-search-field sd-search-field--price">
              <span class="sd-search-field-label">Max price</span>
              <select data-max-price aria-label="Maximum price"></select>
            </label>
          </div>

          <div class="sd-search-divider" aria-hidden="true"></div>

          <label class="sd-search-field sd-search-field--beds">
            <span class="sd-search-field-label">Beds</span>
            <select data-beds aria-label="Minimum bedrooms">
              <option value="">Any beds</option>
              <option value="1">1+ beds</option>
              <option value="2">2+ beds</option>
              <option value="3">3+ beds</option>
              <option value="4">4+ beds</option>
              <option value="5">5+ beds</option>
            </select>
          </label>
        </div>

        <button type="submit" class="sd-search-submit">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" />
          </svg>
          Search
        </button>
      </form>
