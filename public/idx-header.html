<!--
  IDX wrapper header (Includes / Static).
  Verified 2026-06-28 against the live rendered page: IDX strips NOTHING from the
  wrapper — both <link> and <script> survive into the served HTML. So load CSS the
  simple way, via <link> (single source of truth = the hosted CSS files):
    - fonts + idx-wrapper.css here (header chrome)
    - idx-results.css + idx-detail.css in idx-footer.html, so they cascade AFTER
      IDX's default head stylesheets.
  Bump ?v= whenever a CSS file changes so the CDN serves the new version.
-->
